global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: kathirmani_inference
    static_configs:
      - targets: ["serve_metrics:8900"]

  - job_name: netdata
    metrics_path: /api/v1/allmetrics
    params:
      format: [prometheus]
    static_configs:
      - targets: ["netdata:19999"]
    scrape_interval: 5s
