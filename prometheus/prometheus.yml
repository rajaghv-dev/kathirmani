global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "marlin_inference"
    scrape_interval: 15s
    static_configs:
      - targets: ["127.0.0.1:8900"]
    metrics_path: /metrics

  - job_name: "netdata"
    scrape_interval: 5s
    metrics_path: /api/v1/allmetrics
    params:
      format: [prometheus]
    static_configs:
      - targets: ["127.0.0.1:19999"]
