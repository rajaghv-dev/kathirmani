# Zone definitions per camera (master plan §6.3). Polygons are normalized [0..1]
# image coords; placeholders to be drawn against real frames in Phase 10 (zone
# editor). zone_type ∈ shelf|billing_counter|entry|exit|staff_only|high_value_area
# |queue_area|blind_spot.
store_id: kathirmani_01

zones:
  - id: bill_counter_zone
    camera_id: bill_counter
    name: "Billing Counter"
    zone_type: billing_counter
    polygon: [[0.1, 0.4], [0.9, 0.4], [0.9, 0.95], [0.1, 0.95]]   # placeholder

  - id: queue_zone
    camera_id: bill_counter
    name: "Counter Queue"
