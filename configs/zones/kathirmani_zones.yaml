  - id: right_shelf_zone
    camera_id: right_aisle
    name: "Right Aisle Shelf"
    zone_type: shelf
    polygon: [[0.0, 0.2], [1.0, 0.2], [1.0, 0.9], [0.0, 0.9]]     # placeholder

  - id: entry_zone
    camera_id: entry_exit
    name: "Entry"
